version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lowcode-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lowcode
      POSTGRES_USER: lowcode_user
      POSTGRES_PASSWORD: lowcode_pass_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lowcode-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lowcode_user -d lowcode"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lowcode-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis_pass_123 --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - lowcode-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lowcode-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lowcode.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - lowcode-network

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  lowcode-network:
    driver: bridge
